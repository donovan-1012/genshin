<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原神 · 角色图鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0d15;
  --bg2: #11131e;
  --bg3: #181b2a;
  --card: #1a1d2e;
  --card-hover: #222640;
  --border: rgba(255,255,255,0.06);
  --text: #e8e8f0;
  --text2: #8888a0;
  --text3: #555570;
  --gold: #c8a94d;
  --gold-light: #e8d48b;
  --shadow: rgba(0,0,0,0.4);
  --radius: 14px;
  --radius-sm: 10px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  --star: #c8a94d;
  --star-bg: #3a3a50;
  --accent: #c8a94d;
  --header-bg: rgba(11,13,21,0.85);
}

/* Element Colors */
.e-Pyro { --ele: #ef4444; --ele-bg: rgba(239,68,68,0.15); --ele-glow: rgba(239,68,68,0.3); }
.e-Hydro { --ele: #3b82f6; --ele-bg: rgba(59,130,246,0.15); --ele-glow: rgba(59,130,246,0.3); }
.e-Anemo { --ele: #22c55e; --ele-bg: rgba(34,197,94,0.15); --ele-glow: rgba(34,197,94,0.3); }
.e-Electro { --ele: #a855f7; --ele-bg: rgba(168,85,247,0.15); --ele-glow: rgba(168,85,247,0.3); }
.e-Dendro { --ele: #84cc16; --ele-bg: rgba(132,204,22,0.15); --ele-glow: rgba(132,204,22,0.3); }
.e-Cryo { --ele: #67e8f9; --ele-bg: rgba(103,232,249,0.15); --ele-glow: rgba(103,232,249,0.3); }
.e-Geo { --ele: #f59e0b; --ele-bg: rgba(245,158,11,0.15); --ele-glow: rgba(245,158,11,0.3); }

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC',-apple-system,sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--text3); border-radius:3px; }

/* ─── Header ─── */
.header {
  position:sticky; top:0; z-index:100;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  border-bottom:1px solid var(--border);
  padding:16px 24px;
}
.header-inner {
  max-width:1400px; margin:0 auto;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.header h1 {
  font-size:22px; font-weight:700;
  background: linear-gradient(135deg,#c8a94d,#e8d48b,#c8a94d);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  white-space:nowrap;
  letter-spacing:2px;
}
.header h1 span { font-weight:300; opacity:0.6; }

/* ─── Search ─── */
.search-wrap {
  flex:1; min-width:180px; position:relative;
}
.search-wrap i {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--text3); font-size:14px;
  pointer-events:none;
}
.search-wrap input {
  width:100%; padding:10px 14px 10px 38px;
  border:1px solid var(--border); border-radius:10px;
  background: var(--bg3); color:var(--text);
  font-size:14px; font-family:inherit;
  outline:none; transition:var(--transition);
}
.search-wrap input:focus { border-color:var(--gold); box-shadow:0 0 20px rgba(200,169,77,0.1); }
.search-wrap input::placeholder { color:var(--text3); }

/* ─── Filter Bar ─── */
.filters {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.filter-group {
  display:flex; align-items:center; gap:4px;
  background:var(--bg3); border-radius:10px; padding:4px;
  border:1px solid var(--border);
}
.filter-btn {
  padding:6px 12px; border:none; border-radius:7px;
  background:transparent; color:var(--text2);
  font-size:12px; font-family:inherit; cursor:pointer;
  transition:var(--transition); white-space:nowrap;
  display:flex; align-items:center; gap:4px;
}
.filter-btn:hover { color:var(--text); background:rgba(255,255,255,0.05); }
.filter-btn.active {
  background:var(--gold); color:#0b0d15; font-weight:600;
}
.filter-btn .dot {
  width:8px; height:8px; border-radius:50%; display:inline-block;
}
.filter-btn .star-icon { color:var(--star); font-size:11px; }

/* ─── Sort ─── */
.sort-select {
  padding:8px 12px; border:1px solid var(--border); border-radius:10px;
  background:var(--bg3); color:var(--text2); font-size:12px;
  font-family:inherit; cursor:pointer; outline:none;
  transition:var(--transition);
}
.sort-select:hover, .sort-select:focus { border-color:var(--gold); color:var(--text); }

/* ─── Stats Bar ─── */
.stats-bar {
  max-width:1400px; margin:12px auto 0;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 4px 4px;
}
.stats-bar .count { font-size:13px; color:var(--text3); }
.stats-bar .count strong { color:var(--gold); font-weight:600; }
.random-btn {
  padding:6px 16px; border:none; border-radius:8px;
  background:linear-gradient(135deg,var(--gold),#b8942e);
  color:#0b0d15; font-size:12px; font-weight:600;
  font-family:inherit; cursor:pointer;
  transition:var(--transition);
}
.random-btn:hover { transform:scale(1.05); box-shadow:0 0 20px rgba(200,169,77,0.3); }

/* ─── Character Grid ─── */
.grid-wrap {
  max-width:1400px; margin:0 auto; padding:20px 24px 60px;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:14px;
}

/* ─── Character Card ─── */
.char-card {
  position:relative;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:var(--transition);
  animation: cardIn 0.4s ease both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(20px) scale(0.95); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
.char-card:hover {
  transform:translateY(-6px);
  border-color:var(--gold);
  box-shadow:0 12px 40px rgba(200,169,77,0.12);
}
.char-card .img-wrap {
  position:relative;
  width:100%; aspect-ratio:1;
  background:var(--bg2);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.char-card .img-wrap img {
  width:100%; height:100%; object-fit:cover;
  transition:transform 0.5s ease;
}
.char-card:hover .img-wrap img { transform:scale(1.08); }
.char-card .rarity-badge {
  position:absolute; top:8px; right:8px;
  display:flex; gap:1px;
}
.char-card .rarity-badge .s {
  font-size:10px; color:var(--star);
  text-shadow:0 0 6px rgba(200,169,77,0.5);
}
.char-card .ele-badge {
  position:absolute; top:8px; left:8px;
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px;
  background:var(--ele-bg);
  box-shadow:0 0 10px var(--ele-glow);
}
.char-card .info {
  padding:12px 14px 14px;
}
.char-card .name {
  font-size:15px; font-weight:600;
  margin-bottom:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.char-card .tags {
  display:flex; gap:6px; flex-wrap:wrap;
}
.char-card .tag {
  font-size:11px; padding:2px 8px; border-radius:4px;
  background:var(--bg3); color:var(--text2);
  display:flex; align-items:center; gap:3px;
}
.char-card .tag .ele-dot {
  width:6px; height:6px; border-radius:50%; display:inline-block;
}

/* ─── Empty State ─── */
.empty-state {
  grid-column:1/-1;
  text-align:center; padding:80px 20px;
  color:var(--text3);
}
.empty-state .icon { font-size:48px; margin-bottom:16px; opacity:0.4; }
.empty-state p { font-size:14px; }

/* ─── Loading ─── */
.loading-state {
  grid-column:1/-1;
  text-align:center; padding:120px 20px;
}
.spinner {
  width:48px; height:48px; margin:0 auto 20px;
  border:3px solid var(--border);
  border-top-color:var(--gold);
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-state p { color:var(--text3); font-size:14px; }
.loading-bar {
  width:240px; height:3px; margin:16px auto 0;
  background:var(--bg3); border-radius:2px; overflow:hidden;
}
.loading-bar-inner {
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--gold),#e8d48b);
  border-radius:2px;
  transition:width 0.3s ease;
}

/* ─── Modal ─── */
.modal-overlay {
  position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  display:none; align-items:center; justify-content:center;
  padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  position:relative;
  width:100%; max-width:820px;
  max-height:90vh; overflow-y:auto;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:20px;
  animation: modalIn 0.4s ease;
  box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
@keyframes modalIn {
  from { opacity:0; transform:scale(0.9) translateY(20px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}
.modal::-webkit-scrollbar { width:4px; }

.modal-close {
  position:absolute; top:16px; right:16px; z-index:10;
  width:36px; height:36px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(0,0,0,0.5);
  color:var(--text2); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:var(--transition);
  backdrop-filter:blur(10px);
}
.modal-close:hover { background:rgba(255,255,255,0.1); color:var(--text); }

.modal-header {
  position:relative;
  height:340px; overflow:hidden;
  background:var(--bg);
}
.modal-header img {
  width:100%; height:100%; object-fit:cover;
  object-position:top center;
}
.modal-header .header-overlay {
  position:absolute; bottom:0; left:0; right:0;
  height:60%;
  background:linear-gradient(transparent,var(--bg2));
}
.modal-header .header-info {
  position:absolute; bottom:24px; left:28px; right:28px;
  display:flex; align-items:flex-end; gap:16px;
}
.modal-header .header-info .icon-wrap {
  width:72px; height:72px; border-radius:16px;
  overflow:hidden; border:2px solid var(--gold);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  flex-shrink:0;
  background:var(--bg);
}
.modal-header .header-info .icon-wrap img {
  width:100%; height:100%; object-fit:cover;
}
.modal-header .header-info .hi-text h2 {
  font-size:28px; font-weight:700;
  text-shadow:0 2px 12px rgba(0,0,0,0.5);
}
.modal-header .header-info .hi-text .title {
  font-size:14px; color:var(--gold-light);
  margin-top:2px;
}

.modal-body { padding:28px; }

/* Detail Grid */
.detail-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px; margin-bottom:28px;
}
.detail-item {
  background:var(--card); border-radius:var(--radius-sm);
  padding:14px 16px; border:1px solid var(--border);
}
.detail-item .label {
  font-size:11px; color:var(--text3); text-transform:uppercase;
  letter-spacing:1px; margin-bottom:6px;
}
.detail-item .value {
  font-size:14px; font-weight:500;
  display:flex; align-items:center; gap:6px;
}
.detail-item .value .ele-dot {
  width:8px; height:8px; border-radius:50%; display:inline-block;
}

/* Description */
.desc-box {
  background:var(--card); border-radius:var(--radius-sm);
  padding:16px 20px; margin-bottom:24px;
  border:1px solid var(--border);
  font-size:14px; line-height:1.8; color:var(--text2);
  font-style:italic;
}
.desc-box::before { content:'"'; color:var(--gold); font-size:20px; }
.desc-box::after { content:'"'; color:var(--gold); font-size:20px; }

/* Talents Section */
.section-title {
  font-size:16px; font-weight:600;
  margin-bottom:14px; padding-bottom:8px;
  border-bottom:1px solid var(--border);
  color:var(--gold);
  display:flex; align-items:center; gap:8px;
}
.talent-list { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
.talent-item {
  background:var(--card); border-radius:var(--radius-sm);
  padding:14px 18px; border:1px solid var(--border);
}
.talent-item .t-name {
  font-size:14px; font-weight:600; margin-bottom:4px;
  display:flex; align-items:center; gap:8px;
}
.talent-item .t-type {
  font-size:11px; color:var(--text3); font-weight:400;
  background:var(--bg3); padding:2px 8px; border-radius:4px;
}
.talent-item .t-desc {
  font-size:12px; color:var(--text2); line-height:1.7;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  overflow:hidden;
}

/* Constellations */
.const-list { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
.const-item {
  background:var(--card); border-radius:var(--radius-sm);
  padding:12px 16px; border:1px solid var(--border);
}
.const-item .c-name {
  font-size:13px; font-weight:600; margin-bottom:3px;
  display:flex; align-items:center; gap:8px;
}
.const-item .c-name .c-lv {
  font-size:10px; color:var(--text3); font-weight:400;
  background:var(--bg3); padding:2px 6px; border-radius:4px;
}
.const-item .c-desc {
  font-size:12px; color:var(--text2); line-height:1.6;
}

/* Message on close attempt */
.close-msg {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); backdrop-filter:blur(12px);
  border:1px solid var(--border);
  padding:12px 24px; border-radius:12px;
  color:var(--text2); font-size:13px;
  z-index:2000;
  opacity:0; transition:opacity 0.4s ease;
  pointer-events:none;
}
.close-msg.show { opacity:1; }

/* ─── Responsive ─── */
@media(max-width:768px) {
  .header { padding:12px 16px; }
  .header-inner { gap:10px; }
  .header h1 { font-size:18px; }
  .filters { order:3; width:100%; }
  .grid-wrap { padding:14px 14px 40px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
  .modal-header { height:240px; }
  .modal-header .header-info { bottom:16px; left:16px; right:16px; }
  .modal-header .header-info .icon-wrap { width:52px; height:52px; }
  .modal-header .header-info .hi-text h2 { font-size:20px; }
  .modal-body { padding:16px; }
  .detail-grid { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:480px) {
  .grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  .char-card .info { padding:8px 10px 10px; }
  .char-card .name { font-size:13px; }
  .filter-btn { padding:4px 8px; font-size:11px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <h1>原神 <span>· 角色图鉴</span></h1>
    <div class="search-wrap">
      <i>🔍</i>
      <input type="text" id="searchInput" placeholder="搜索角色名称..." autocomplete="off">
    </div>
    <div class="filters" id="filterBar"></div>
  </div>
  <div class="stats-bar">
    <div class="count">共 <strong id="totalCount">0</strong> 位角色</div>
    <button class="random-btn" onclick="pickRandom()">🎲 随机角色</button>
  </div>
</header>

<!-- Grid -->
<div class="grid-wrap">
  <div class="grid" id="charGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Close message -->
<div class="close-msg" id="closeMsg"></div>

let allChars = [];

// ─── Fetch ───
const CACHE_KEY = 'genshin_chars';

async function fetchAll() {

    if (cached) {
      const { data, time } = JSON.parse(cached);
      if (Date.now() - time < CACHE_TTL) {
        allChars = data;
        afterFetch();
        return;
      }
    }

    // Get character list
    const slugs = await fetchJSON(`${API}/characters`);
    const bar = document.querySelector('.loading-bar-inner');
    
    // Fetch all character details in parallel
    const results = [];
    const concurrency = 20;
    for (let i = 0; i < slugs.length; i += concurrency) {
      const batch = slugs.slice(i, i + concurrency);
      const chunk = await Promise.all(
        batch.map(slug => fetchJSON(`${API}/characters/${ slug }?lang=zh-cn`).catch(() => null))
      );
      results.push(...chunk);
      if (bar) bar.style.width = Math.min(100, (results.length / slugs.length) * 100) + '%';
    }
    
    allChars = results.filter(Boolean);
    // Filter out Traveler variants
    allChars = allChars.filter(c => !c.id.startsWith('traveler-'));
    // Cache
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ data: allChars, time: Date.now() })); } catch(e) {}
    afterFetch();
  } catch(e) {
    console.error('Failed to fetch:', e);
    document.getElementById('charGrid').innerHTML = `
      <div class="empty-state">
        <div class="icon">😵</div>
        <p>加载失败，请刷新页面重试</p>
      </div>`;
    showLoading(false);
  }
}

function afterFetch() {
  allChars.sort((a,b) => (b.release||'').localeCompare(a.release||''));
  filteredChars = [...allChars];
  applyFilters();
  renderGrid();
  showLoading(false);
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.statusText);
  return res.json();
}

// ─── Filter Bar ───
function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  let html = '';
  
  // Element filters
  html += `<div class="filter-group">`;
  html += `<button class="filter-btn active" data-type="element" data-value="">全部</button>`;
  ELEMENTS.forEach(e => {
    html += `<button class="filter-btn" data-type="element" data-value="${e}" style="--ele-bg:var(--ele-bg);">
      <span class="dot" style="background:var(--ele)"></span> ${ELE_CN[e]}
    </button>`;
  });
  html += `</div>`;
  
  // Nation filters
  html += `<div class="filter-group" id="nationFilter">`;
  html += `<button class="filter-btn active" data-type="nation" data-value="">全部</button>`;
  NATIONS.forEach(n => {
    html += `<button class="filter-btn" data-type="nation" data-value="${n}">${EMOJI[n]||''} ${NATION_CN[n]}</button>`;
  });
  html += `</div>`;
  
  // Weapon filters
  html += `<div class="filter-group">`;
  html += `<button class="filter-btn active" data-type="weapon" data-value="">全部</button>`;
  WEAPONS.forEach(w => {
    html += `<button class="filter-btn" data-type="weapon" data-value="${w}">${EMOJI[w]} ${WEAPON_CN[w]}</button>`;
  });
  html += `</div>`;
  
  // Rarity filters
  html += `<div class="filter-group">`;
  html += `<button class="filter-btn active" data-type="rarity" data-value="0">全部</button>`;
  RARITIES.forEach(r => {
    html += `<button class="filter-btn" data-type="rarity" data-value="${r}">
      <span class="star-icon">★</span> ${RARITY_CN[r]}
    </button>`;
  });
  html += `</div>`;
  
  // Sort
  html += `<select class="sort-select" id="sortSelect">
    <option value="name">按名称</option>
    <option value="rarity">按星级 ↓</option>
    <option value="newest">最新 ↑</option>
    <option value="nation">按国家</option>
  </select>`;
  
  bar.innerHTML = html;
  
  // Filter click handlers
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.type;
      const value = btn.dataset.value;
      // Deactivate siblings
      btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilters[type] = value;
      applyFilters();
    });
  });
  
  // Sort handler
  document.getElementById('sortSelect').addEventListener('change', e => {
    currentSort = e.target.value;
    applyFilters();
  });
  
  // Search handler
  document.getElementById('searchInput').addEventListener('input', e => {
    currentFilters.search = e.target.value.trim().toLowerCase();
    applyFilters();
  });
}

// ─── Apply Filters ───
function applyFilters() {
  const { search, element, nation, weapon, rarity } = currentFilters;
  
  filteredChars = allChars.filter(c => {
    const cn = getCN(c.id);
    if (search && !c.name.toLowerCase().includes(search) &&
        !c.title?.toLowerCase().includes(search) &&
        !cn.toLowerCase().includes(search)) return false;
    if (element && c.vision !== element) return false;
    if (nation && c.nation !== nation) return false;
    if (weapon && c.weapon !== weapon) return false;
    if (rarity && c.rarity !== Number(rarity)) return false;
    return true;
  });
  
  // Sort
  switch (currentSort) {
    case 'name':
      filteredChars.sort((a,b) => a.name.localeCompare(b.name));
      break;
    case 'rarity':
      filteredChars.sort((a,b) => b.rarity - a.rarity || a.name.localeCompare(b.name));
      break;
    case 'newest':
      filteredChars.sort((a,b) => (b.release||'').localeCompare(a.release||''));
      break;
    case 'nation':
      filteredChars.sort((a,b) => (a.nation||'zzz').localeCompare(b.nation||'zzz') || a.name.localeCompare(b.name));
      break;
  }
  
  document.getElementById('totalCount').textContent = filteredChars.length;
  renderGrid();
}

// ─── Render Grid ───
function renderGrid() {
  const grid = document.getElementById('charGrid');
  
  if (filteredChars.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="icon">🔍</div>
      <p>没有找到匹配的角色</p>
    </div>`;
    return;
  }
  
  grid.innerHTML = filteredChars.map(c => {
    const stars = Array(c.rarity).fill('★').join('');
    const eleClass = `e-${c.vision}`;
    
    return `<div class="char-card ${eleClass}" onclick="openModal('${c.id}')" style="animation-delay:${Math.random()*0.2}s">
      <div class="img-wrap">
        <img src="${API}/characters/${c.id}/icon-big" alt="${c.name}" loading="lazy"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%231a1d2e%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2240%22 fill=%22%23555570%22>❓</text></svg>'">
        <div class="rarity-badge">${stars.split('').map(()=>'<span class="s">★</span>').join('')}</div>
        <div class="ele-badge" style="background:var(--ele-bg);box-shadow:0 0 10px var(--ele-glow);">${EMOJI[c.vision]||'?'}</div>
      </div>
      <div class="info">
        <div class="name">${getCN(c.id) ? getCN(c.id)+' '+c.name : c.name}</div>
        <div class="tags">
          <span class="tag"><span class="ele-dot" style="background:var(--ele)"></span> ${ELE_CN[c.vision]||c.vision}</span>
          <span class="tag">${EMOJI[c.weapon]} ${WEAPON_CN[c.weapon]||c.weapon}</span>
          <span class="tag">${c.nation ? (EMOJI[c.nation]||'')+' '+NATION_CN[c.nation]||c.nation : '未知'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── Modal ───
function openModal(slug) {
  const c = allChars.find(x => x.id === slug);
  if (!c) return;
  
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  
  const eleClass = `e-${c.vision}`;
  const stars = Array(c.rarity).fill('★').join('');
  
  const talentsHTML = (c.skillTalents||[]).slice(0,3).map(t => `
    <div class="talent-item">
      <div class="t-name">${t.name} <span class="t-type">${t.unlock}</span></div>
      <div class="t-desc">${(t.description||'').substring(0,180)}${(t.description||'').length>180?'...':''}</div>
    </div>
  `).join('');
  
  const constHTML = (c.constellations||[]).map(co => `
    <div class="const-item">
      <div class="c-name"><span class="c-lv">C${co.level}</span> ${co.name}</div>
      <div class="c-desc">${(co.description||'').substring(0,120)}${(co.description||'').length>120?'...':''}</div>
    </div>
  `).join('');
  
  const genderCN = c.gender === 'Male' ? '♂ 男' : c.gender === 'Female' ? '♀ 女' : c.gender||'未知';
  
  content.innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    
    <div class="modal-header">
      <img src="${API}/characters/${c.id}/portrait" alt="${c.name}"
           onerror="this.src='${API}/characters/${c.id}/gacha-splash'"
           loading="lazy">
      <div class="header-overlay"></div>
      <div class="header-info">
        <div class="icon-wrap">
          <img src="${API}/characters/${c.id}/icon" alt="${c.name}" loading="lazy">
        </div>
        <div class="hi-text">
          <h2>${getCN(c.id) ? getCN(c.id)+' '+c.name : c.name}</h2>
          <div class="title">${c.title||''} · ${stars}</div>
        </div>
      </div>
    </div>
    
    <div class="modal-body">
      <div class="detail-grid">
        <div class="detail-item">
          <div class="label">元素</div>
          <div class="value ${eleClass}"><span class="ele-dot" style="background:var(--ele)"></span> ${EMOJI[c.vision]} ${ELE_CN[c.vision]||c.vision}</div>
        </div>
        <div class="detail-item">
          <div class="label">武器</div>
          <div class="value">${EMOJI[c.weapon]} ${WEAPON_CN[c.weapon]||c.weapon}</div>
        </div>
        <div class="detail-item">
          <div class="label">国家</div>
          <div class="value">${c.nation ? (EMOJI[c.nation]||'')+' '+NATION_CN[c.nation]||c.nation : '未知'}</div>
        </div>
        <div class="detail-item">
          <div class="label">性别</div>
          <div class="value">${genderCN}</div>
        </div>
        <div class="detail-item">
          <div class="label">星级</div>
          <div class="value" style="color:var(--gold)">${stars}</div>
        </div>
        <div class="detail-item">
          <div class="label">所属</div>
          <div class="value">${c.affiliation||'无'}</div>
        </div>
        <div class="detail-item">
          <div class="label">命座</div>
          <div class="value">${c.constellation||'未知'}</div>
        </div>
        <div class="detail-item">
          <div class="label">生日</div>
          <div class="value">${c.birthday && c.birthday !== '0000-00-00' ? c.birthday.slice(5) : '未知'}</div>
        </div>
      </div>
      
      ${c.description ? `<div class="desc-box">${c.description}</div>` : ''}
      
      ${talentsHTML ? `<div class="section-title">⚔️ 战斗天赋</div><div class="talent-list">${talentsHTML}</div>` : ''}
      
      ${constHTML ? `<div class="section-title">✨ 命之座</div><div class="const-list">${constHTML}</div>` : ''}
    </div>
  `;
  
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// Click overlay to close
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ESC to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').classList.contains('open')) {
      closeModal();
    }
  }
});

// ─── Random ───
function pickRandom() {
  if (filteredChars.length === 0) return;
  const c = filteredChars[Math.floor(Math.random() * filteredChars.length)];
  openModal(c.id);
}

// ─── Loading ───
function showLoading(show) {
  const grid = document.getElementById('charGrid');
  if (show) {
    grid.innerHTML = `<div class="loading-state">
      <div class="spinner"></div>
      <p>正在从提瓦特大陆加载角色数据...</p>
      <div class="loading-bar"><div class="loading-bar-inner"></div></div>
    </div>`;
  }
}

// ─── Init ───
buildFilterBar();
fetchAll();
</script>
